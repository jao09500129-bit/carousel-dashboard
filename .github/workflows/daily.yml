name: Daily Carousel Dashboard Build

on:
  schedule:
    # Mon-Fri 08:30 KST = 23:30 UTC Sun-Thu
    - cron: '30 23 * * 0-4'
  # v5: 사용자 .bat 이 paper_status.json 을 push 하면 즉시 재빌드
  push:
    paths:
      - 'paper_status.json'
  workflow_dispatch: {}

permissions:
  contents: write

# 동시 실행 방지 (스케줄 + push 가 겹쳐 race 안 나도록)
concurrency:
  group: dashboard-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run build
        run: |
          python build/build.py
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
